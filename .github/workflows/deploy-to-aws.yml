name: Deploy site to AWS

on: push

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Install dependencies
        uses: pnpm/action-setup@v4
        with:
          version: 8
          run_install: true

      - name: Build site
        run: pnpm run build